<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerMax</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header>
    <div class="logo">
        <img src="logo.png" alt="PowerMax">
    </div>

    <div class="cart-icon">
    <i class="fa-solid fa-cart-shopping"></i>
    <span id="cart-count">0</span>
</div>
</header>

<section class="banner">
    <img src="banner.png" alt="Banner PowerMax">
</section>

<section class="products">

    <div class="product">
        <img src="pretreino.png" alt="Produto 1">
        <h3>Pré-Treino Uva Verde (sem cafeína)</h3>
        <p>R$ 79,90</p>
        <button onclick="addToCart()">Adicionar ao Carrinho</button>
    </div>

    <div class="product">
        <img src="pretreino.png" alt="Produto 1">
        <h3>Pré-Treino Manga (sem cafeína)</h3>
        <p>R$ 79,90</p>
        <button onclick="addToCart()">Adicionar ao Carrinho</button>
    </div>

    <div class="product">
        <img src="pretreino.png" alt="Produto 1">
        <h3>Pré-Treino Tuti-Fruti (sem cafeína)</h3>
        <p>R$ 79,90</p>
        <button onclick="addToCart()">Adicionar ao Carrinho</button>
    </div>

    <div class="product">
        <img src="pretreino.png" alt="Produto 1">
        <h3>Pré-Treino Morango (sem cafeína)</h3>
        <p>R$ 79,90</p>
        <button onclick="addToCart()">Adicionar ao Carrinho</button>
    </div>

    <div class="product">
        <img src="regata.png" alt="Produto 2">
        <h3>Regata Unissex</h3>
        <p>R$ 59,90</p>
        <button onclick="addToCart()">Adicionar ao Carrinho</button>
    </div>

    <div class="product">
        <img src="coqueteleira.png" alt="Produto 3">
        <h3>Coqueteleira PowerMax</h3>
        <p>R$ 29,90</p>
        <button onclick="addToCart()">Adicionar ao Carrinho</button>
    </div>

</section>

<script src="script.js"></script>

</body>
</html>
